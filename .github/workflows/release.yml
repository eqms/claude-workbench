name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update Homebrew formula for (e.g. v0.96.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (ubuntu-22.04 for GLIBC 2.35 compatibility with Debian 12+)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary_name: claude-workbench
            # Asset name follows self_update convention: {bin}-{target}.tar.gz
            asset_name: claude-workbench-x86_64-unknown-linux-gnu.tar.gz
            archive_type: tar.gz

          # Linux ARM64 (cross-compiled, ubuntu-22.04 for GLIBC compatibility)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            binary_name: claude-workbench
            asset_name: claude-workbench-aarch64-unknown-linux-gnu.tar.gz
            archive_type: tar.gz
            cross: true

          # macOS Apple Silicon (M1/M2/M3/M4)
          - target: aarch64-apple-darwin
            os: macos-latest
            binary_name: claude-workbench
            asset_name: claude-workbench-aarch64-apple-darwin.tar.gz
            archive_type: tar.gz

          # macOS Intel (cross-compiled from ARM64 runner)
          - target: x86_64-apple-darwin
            os: macos-latest
            binary_name: claude-workbench
            asset_name: claude-workbench-x86_64-apple-darwin.tar.gz
            archive_type: tar.gz

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: claude-workbench.exe
            asset_name: claude-workbench-x86_64-pc-windows-msvc.zip
            archive_type: zip

          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            binary_name: claude-workbench.exe
            asset_name: claude-workbench-aarch64-pc-windows-msvc.zip
            archive_type: zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for ARM64 Linux cross-compilation
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      # Install ARM64 cross-compilation tools for Linux
      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Build with cross for ARM64 Linux
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # Build natively for other platforms
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      # Create tar.gz archive (Unix)
      - name: Create archive (Unix)
        if: matrix.archive_type == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x ${{ matrix.binary_name }}
          tar czvf ../../../${{ matrix.asset_name }} ${{ matrix.binary_name }}

      # Create zip archive (Windows)
      - name: Create archive (Windows)
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Get previous tag
        id: prev_tag
        run: |
          # Get the tag before the current one
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          CURRENT_TAG="${{ github.ref_name }}"

          echo "Generating changelog from $PREV_TAG to $CURRENT_TAG"

          if [ -n "$PREV_TAG" ]; then
            # Get commits between tags, format nicely
            CHANGELOG=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --no-merges | head -20)
          else
            # First release, get recent commits
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -10)
          fi

          # Escape for GitHub Actions multiline output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Claude Workbench ${{ github.ref_name }}
          body: |
            ## Claude Workbench ${{ github.ref_name }}

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x64 | `claude-workbench-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | ARM64 | `claude-workbench-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS | Apple Silicon (M1/M2/M3/M4) | `claude-workbench-aarch64-apple-darwin.tar.gz` |
            | macOS | Intel | `claude-workbench-x86_64-apple-darwin.tar.gz` |
            | Windows | x64 | `claude-workbench-x86_64-pc-windows-msvc.zip` |
            | Windows | ARM64 | `claude-workbench-aarch64-pc-windows-msvc.zip` |

            ### Installation

            **Homebrew (macOS / Linux):**
            ```bash
            brew install eqms/claude-workbench/claude-workbench
            ```

            **Unix (Linux/macOS):**
            ```bash
            # Download and extract
            tar xzf claude-workbench-*.tar.gz
            chmod +x claude-workbench
            ./claude-workbench
            ```

            **Windows:**
            ```powershell
            # Extract zip and run
            Expand-Archive claude-workbench-*.zip -DestinationPath .
            .\claude-workbench.exe
            ```

            ### Auto-Update

            Claude Workbench includes built-in auto-update functionality. Updates are checked automatically on startup.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Homebrew assets and compute SHA256
        id: hashes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Updating formula for $TAG (version $VERSION)"

          # Four Homebrew targets (no Windows)
          TARGETS=(
            "aarch64-apple-darwin"
            "x86_64-apple-darwin"
            "aarch64-unknown-linux-gnu"
            "x86_64-unknown-linux-gnu"
          )

          mkdir -p /tmp/assets

          # Download each asset and compute sha256
          for TARGET in "${TARGETS[@]}"; do
            ASSET="claude-workbench-${TARGET}.tar.gz"
            echo "Downloading $ASSET ..."
            gh release download "$TAG" \
              --repo eqms/claude-workbench \
              --pattern "$ASSET" \
              --dir /tmp/assets
            if [ ! -f "/tmp/assets/$ASSET" ]; then
              echo "ERROR: Asset $ASSET not found in release $TAG"
              exit 1
            fi
            SHA=$(sha256sum /tmp/assets/$ASSET | awk '{print $1}')
            echo "sha256_${TARGET//-/_}=$SHA" >> $GITHUB_OUTPUT
            echo "$TARGET -> $SHA"
          done

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: eqms/homebrew-claude-workbench
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
          path: tap

      - name: Rewrite formula
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          FORMULA="tap/Formula/claude-workbench.rb"

          # Verify all four sha256 values are non-empty and 64 hex chars
          SHA_AARCH64_DARWIN="${{ steps.hashes.outputs.sha256_aarch64_apple_darwin }}"
          SHA_X86_64_DARWIN="${{ steps.hashes.outputs.sha256_x86_64_apple_darwin }}"
          SHA_AARCH64_LINUX="${{ steps.hashes.outputs.sha256_aarch64_unknown_linux_gnu }}"
          SHA_X86_64_LINUX="${{ steps.hashes.outputs.sha256_x86_64_unknown_linux_gnu }}"

          for SHA in "$SHA_AARCH64_DARWIN" "$SHA_X86_64_DARWIN" "$SHA_AARCH64_LINUX" "$SHA_X86_64_LINUX"; do
            if [ -z "$SHA" ] || [ ${#SHA} -ne 64 ]; then
              echo "ERROR: Invalid SHA256 value: '$SHA'"
              exit 1
            fi
          done

          # Replace version in all 4 download URLs
          sed -i "s|/releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/|/releases/download/${TAG}/|g" "$FORMULA"

          # Replace sha256 values — formula has exactly 4 sha256 lines in this order:
          # aarch64-apple-darwin, x86_64-apple-darwin, aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu
          awk -v s1="$SHA_AARCH64_DARWIN" \
              -v s2="$SHA_X86_64_DARWIN" \
              -v s3="$SHA_AARCH64_LINUX" \
              -v s4="$SHA_X86_64_LINUX" \
              'BEGIN{n=0}
               /^[[:space:]]*sha256 "/ {
                 n++
                 if(n==1) { sub(/"[a-f0-9]{64}"/, "\"" s1 "\"") }
                 if(n==2) { sub(/"[a-f0-9]{64}"/, "\"" s2 "\"") }
                 if(n==3) { sub(/"[a-f0-9]{64}"/, "\"" s3 "\"") }
                 if(n==4) { sub(/"[a-f0-9]{64}"/, "\"" s4 "\"") }
               }
               { print }' "$FORMULA" > "$FORMULA.tmp" && mv "$FORMULA.tmp" "$FORMULA"

          echo "Formula after update:"
          cat "$FORMULA"

          # Sanity check: exactly 4 sha256 lines present
          SHA_COUNT=$(grep -c 'sha256 "' "$FORMULA")
          if [ "$SHA_COUNT" -ne 4 ]; then
            echo "ERROR: Expected 4 sha256 lines, found $SHA_COUNT"
            exit 1
          fi

      - name: Commit and push formula
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-workbench.rb
          if git diff --cached --quiet; then
            echo "No changes to formula — already up to date for $TAG"
            exit 0
          fi
          git commit -m "[CHG] Update to ${TAG}"
          git push
          echo "Formula updated and pushed for $TAG"
